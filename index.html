<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ম্যাথ ক্যাঙ্গারু বাংলাদেশ - অনলাইন ফাউন্ডেশন ক্যাম্প</title>
  <meta name="title" content="ম্যাথ ক্যাঙ্গারু বাংলাদেশ - অনলাইন ফাউন্ডেশন ক্যাম্প">
  <meta name="description" content="ম্যাথ ক্যাঙ্গারু বাংলাদেশ আয়োজিত অনলাইন ফাউন্ডেশন ক্যাম্পে রেজিস্ট্রেশন করতে ভিজিট করুন।">

  <!-- Favicon Tag -->
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- Open Graph / Facebook / WhatsApp / Messenger / Instagram -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ম্যাথ ক্যাঙ্গারু বাংলাদেশ - অনলাইন ফাউন্ডেশন ক্যাম্প">
  <meta property="og:description" content="১ম থেকে ৫ম শ্রেণির শিক্ষার্থীদের জন্য অনলাইন ম্যাথ ক্যাঙ্গারু ফাউন্ডেশন ক্যাম্প। বিস্তারিত জানতে এবং রেজিস্ট্রেশন করতে ভিজিট করুন।">
  <meta property="og:image" content="../favicon.png">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ম্যাথ ক্যাঙ্গারু বাংলাদেশ - অনলাইন ফাউন্ডেশন ক্যাম্প">
  <meta name="twitter:description" content="১ম থেকে ৫ম শ্রেণির শিক্ষার্থীদের জন্য অনলাইন ম্যাথ ক্যাঙ্গারু ফাউন্ডেশন ক্যাম্প। বিস্তারিত জানতে এবং রেজিস্ট্রেশন করতে ভিজিট করুন।">
  <meta name="twitter:image" content="../favicon.png">

  <!-- Auto Redirect Meta (Fallback: 3 Seconds) -->
  <meta http-equiv="refresh" content="3;url=../Registration/">

  <!-- FontAwesome 6 & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-teal: #0F675F;
      --primary-red: #BF2327;
      --bg-color: #f8fafc;
      --text-dark: #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Hind Siliguri', sans-serif;
    }

    body {
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .loading-card {
      background: #ffffff;
      width: 100%;
      max-width: 480px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(15, 103, 95, 0.08);
      border: 1px solid #e2e8f0;
      text-align: center;
      position: relative;
    }

    .brand-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 5px;
    }

    .brand-title .brand {
      color: var(--primary-teal);
    }

    .brand-title .country {
      color: #000000;
    }

    .sub-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .sub-title .online {
      color: #000000;
    }

    .sub-title .camp {
      color: var(--primary-red);
    }

    /* Outer Animated Circle Spinner */
    .spinner-container {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 25px auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .spinner {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid #ccfbf1;
      border-top: 4px solid var(--primary-teal);
      border-bottom: 4px solid var(--primary-red);
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }

    .spinner-icon {
      font-size: 32px;
      color: var(--primary-teal);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Progress Bar */
    .progress-box {
      width: 100%;
      background: #e2e8f0;
      height: 8px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-teal), var(--primary-red));
      border-radius: 10px;
      animation: fillProgress 3s linear forwards;
    }

    @keyframes fillProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .status-text {
      font-size: 15px;
      color: #475569;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .redirect-note {
      font-size: 13px;
      color: #94a3b8;
    }

    .manual-link {
      color: var(--primary-teal);
      text-decoration: none;
      font-weight: 700;
    }

    .manual-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="loading-card">
    <h1 class="brand-title">
      <span class="brand">ম্যাথ ক্যাঙ্গারু</span> <span class="country">বাংলাদেশ</span>
    </h1>
    <h2 class="sub-title">
      <span class="online">অনলাইন</span> <span class="camp">ফাউন্ডেশন ক্যাম্প</span>
    </h2>

    <!-- Animated Spinner -->
    <div class="spinner-container">
      <div class="spinner"></div>
      <i class="fa-solid fa-graduation-cap spinner-icon"></i>
    </div>

    <!-- Progress Bar -->
    <div class="progress-box">
      <div class="progress-bar"></div>
    </div>

    <p class="status-text">রেজিস্ট্রেশন পেজে নিয়ে যাওয়া হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</p>
    <p class="redirect-note"><span id="countdown">3</span> সেকেন্ডের মধ্যে রিডাইরেক্ট না হলে <a href="../Registration/" class="manual-link">এখানে ক্লিক করুন</a>।</p>
  </div>

  <script>
    // Countdown Timer Logic
    let seconds = 3;
    const countdownEl = document.getElementById('countdown');

    const interval = setInterval(() => {
      seconds--;
      if (seconds >= 0) {
        countdownEl.innerText = seconds;
      }
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = "../Registration/";
      }
    }, 1000);
  </script>
</body>
</html>
