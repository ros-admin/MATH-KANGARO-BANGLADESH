  <meta name="twitter:description" content="১ম থেকে ৫ম শ্রেণির শিক্ষার্থীদের জন্য অনলাইন ম্যাথ ক্যাঙ্গারু ফাউন্ডেশন ক্যাম্প। বিস্তারিত জানতে এবং রেজিস্ট্রেশন করতে ভিজিট করুন।">

  <!-- Auto Redirect Meta (3 Seconds) -->
  <meta http-equiv="refresh" content="3;url=../Registration/">

  <!-- FontAwesome 6 & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-teal: #0F675F;
      --primary-red: #BF2327;
      --bg-color: #f8fafc;
      --text-dark: #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Hind Siliguri', sans-serif;
    }

    body {
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* --- ব্যাকগ্রাউন্ড গাণিতিক চিহ্নের লেয়ার --- */
    .math-bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .math-item {
      position: absolute;
      color: var(--primary-teal);
      font-weight: 700;
      opacity: 0.14;
      user-select: none;
      animation: floatMath 12s infinite ease-in-out alternate;
    }

    @keyframes floatMath {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 0.12;
      }
      50% {
        transform: translate(15px, -20px) rotate(15deg) scale(1.15);
        opacity: 0.20;
      }
      100% {
        transform: translate(-10px, 15px) rotate(-10deg) scale(0.95);
        opacity: 0.10;
      }
    }

    /* পজিশন ও টাইমিং ডিফারেন্স */
    .math-item:nth-child(1)  { top: 5%;  left: 8%;  font-size: 26px; animation-duration: 10s; }
    .math-item:nth-child(2)  { top: 10%; left: 80%; font-size: 22px; animation-duration: 14s; }
    .math-item:nth-child(3)  { top: 18%; left: 45%; font-size: 28px; animation-duration: 11s; }
    .math-item:nth-child(4)  { top: 30%; left: 10%; font-size: 20px; animation-duration: 13s; }
    .math-item:nth-child(5)  { top: 35%; left: 85%; font-size: 25px; animation-duration: 9s;  }
    .math-item:nth-child(6)  { top: 50%; left: 5%;  font-size: 24px; animation-duration: 15s; }
    .math-item:nth-child(7)  { top: 55%; left: 90%; font-size: 22px; animation-duration: 12s; }
    .math-item:nth-child(8)  { top: 70%; left: 12%; font-size: 27px; animation-duration: 10s; }
    .math-item:nth-child(9)  { top: 75%; left: 82%; font-size: 21px; animation-duration: 14s; }
    .math-item:nth-child(10) { top: 88%; left: 20%; font-size: 26px; animation-duration: 11s; }
    .math-item:nth-child(11) { top: 90%; left: 75%; font-size: 23px; animation-duration: 13s; }
    .math-item:nth-child(12) { top: 45%; left: 50%; font-size: 25px; animation-duration: 16s; }

    /* সবুজ বর্ডার সহ লোডিং কার্ড */
    .loading-card {
      background: #ffffff;
      width: 100%;
      max-width: 500px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(15, 103, 95, 0.12);
      border: 2px solid var(--primary-teal); /* বর্ডার সবুজ করা হয়েছে */
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .brand-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 5px;
    }

    .brand-title .brand {
      color: var(--primary-teal);
    }

    .brand-title .country {
      color: #000000;
    }

    .sub-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 25px;
    }

    .sub-title .online {
      color: #000000;
    }

    .sub-title .camp {
      color: var(--primary-red);
    }

    /* Organized By Section */
    .organized-by-section {
      margin: 20px 0 25px 0;
      padding: 15px 10px;
      background: #f0fdfa;
      border-radius: 12px;
      border: 1px solid #ccfbf1;
    }

    .organized-by-section h4 {
      font-size: 13px;
      color: #475569;
      margin-bottom: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .organizer-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .organizer-logos a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 6px 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      transition: transform 0.2s ease;
    }

    .organizer-logos a:hover {
      transform: translateY(-2px);
    }

    .organizer-logos img {
      max-height: 38px;
      width: auto;
      object-fit: contain;
    }

    /* Progress Bar */
    .progress-box {
      width: 100%;
      background: #e2e8f0;
      height: 8px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-teal), var(--primary-red));
      border-radius: 10px;
      animation: fillProgress 3s linear forwards;
    }

    @keyframes fillProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .status-text {
      font-size: 16px;
      color: var(--primary-teal);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .manual-link {
      color: var(--primary-teal);
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }

    .manual-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- ব্যাকগ্রাউন্ড গাণিতিক চিহ্নের লেয়ার -->
  <div class="math-bg-layer">
    <span class="math-item">+ × ÷ -</span>
    <span class="math-item">📐 ㏒ ∭</span>
    <span class="math-item">⊿ ⅒ ≐</span>
    <span class="math-item">⅚ ⅑ ✎</span>
    <span class="math-item">ᝰ .ᐟ ⋆</span>
    <span class="math-item">⑅ ˚₊ e = ∑</span>
    <span class="math-item">¹ₙ 📚 ∑</span>
    <span class="math-item">√ 🔬 🧪</span>
    <span class="math-item">🥽 📏 +</span>
    <span class="math-item">× ÷ - 📐</span>
    <span class="math-item">㏒ ∭ ⊿</span>
    <span class="math-item">˚₊ e = ∑</span>
  </div>

  <div class="loading-card">
    <h1 class="brand-title">
      <span class="brand">ম্যাথ ক্যাঙ্গারু</span> <span class="country">বাংলাদেশ</span>
    </h1>
    <h2 class="sub-title">
      <span class="online">অনলাইন</span> <span class="camp">ফাউন্ডেশন ক্যাম্প</span>
    </h2>

    <!-- Organized By Section -->
    <div class="organized-by-section">
      <h4>Organized By</h4>
      <div class="organizer-logos">
        <a href="https://www.bdosn.org/" target="_blank" title="BDOSN">
          <img src="https://www.bdosn.org/images/bdosn-logo-128.png" alt="BDOSN Logo">
        </a>
        <a href="https://maslab.org/" target="_blank" title="MASLab">
          <img src="https://maslab.org/wp-content/uploads/2024/03/MASLab-Logo-1-1.png" alt="MASLab Logo">
        </a>
        <a href="https://kangaroomathbd.org/" target="_blank" title="Math Kangaroo Bangladesh">
          <img src="https://kangaroomathbd.org/wp-content/uploads/2026/04/math_kangaroo_logo-01-300x156.png" alt="Math Kangaroo Logo">
        </a>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-box">
      <div class="progress-bar"></div>
    </div>

    <p class="status-text">নিবন্ধন ফরমে নিয়ে যাওয়া হচ্ছে...</p>
  </div>

  <script>
    // Redirect to Registration Page after 3 seconds
    setTimeout(() => {
      window.location.href = "../Registration/";
    }, 3000);
  </script>
</body>
</html>
